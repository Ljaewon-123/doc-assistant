version: '3.8'
services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: docassist
      POSTGRES_PASSWORD: docassist
      POSTGRES_DB: doc_assistant
    ports:
      - '5433:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build: .
    ports:
      - '3000:3000'
    env_file: .env
    environment:
      DATABASE_URL: postgresql://docassist:docassist@postgres:5432/doc_assistant
    depends_on:
      - postgres
    volumes:
      - uploads:/app/uploads
      - outputs:/app/outputs

volumes:
  pgdata:
  uploads:
  outputs:
